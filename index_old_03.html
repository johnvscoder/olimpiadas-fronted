<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenamiento Olímpico de Matemáticas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
            margin-top: 40px;
        }
        h1, h2 {
            color: #1e3a8a;
            text-align: center;
            margin-top: 0;
        }
        .login-box {
            max-width: 400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input {
            padding: 12px;
            font-size: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        /* 📜 ESTILOS NUEVOS PARA LA LISTA DE TEMAS */
        .lista-temas {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        .tema-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tema-card:hover {
            border-color: #2563eb;
            background: #f0fdf4;
            transform: translateX(5px);
        }
        .tema-info h3 {
            margin: 0 0 5px 0;
            color: #1e3a8a;
        }
        .tema-info span {
            font-size: 13px;
            color: #64748b;
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 12px;
        }
        .flecha {
            color: #2563eb;
            font-weight: bold;
            font-size: 18px;
        }
        .oculto { display: none !important; }
    </style>
</head>
<body>

    <div id="pantallaLogin" class="container">
        <h2>🔒 Ingreso de Alumnos</h2>
        <p style="text-align: center; color: #64748b;">Introduce las credenciales asignadas por tu entrenador.</p>
        <div class="login-box">
            <input type="text" id="txtUsuario" placeholder="Tu usuario">
            <input type="password" id="txtContrasena" placeholder="Tu contraseña">
            <button id="btnLogin">Iniciar Sesión</button>
            <p id="lblError" style="color: red; text-align: center; font-weight: bold; margin: 0;"></p>
        </div>
    </div>

    <div id="pantallaPrincipal" class="container oculto">
        <h1>🏆 Panel de Entrenamiento Olímpico</h1>
        <p style="text-align: center; color: #64748b;">Selecciona el tema de matemáticas que deseas entrenar hoy:</p>
        
        <div id="contenedorTemas" class="lista-temas">
            <p class="loading">Cargando temas disponibles...</p>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://olimpiadas-backend.onrender.com';

        const pantallaLogin = document.getElementById('pantallaLogin');
        const pantallaPrincipal = document.getElementById('pantallaPrincipal');
        const btnLogin = document.getElementById('btnLogin');
        const txtUsuario = document.getElementById('txtUsuario');
        const txtContrasena = document.getElementById('txtContrasena');
        const lblError = document.getElementById('lblError');
        const contenedorTemas = document.getElementById('contenedorTemas');

        // Lógica del Login
        btnLogin.addEventListener('click', async () => {
            lblError.textContent = "";
            try {
                const respuesta = await fetch(`${BACKEND_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: txtUsuario.value, contrasena: txtContrasena.value })
                });
                const resultado = await respuesta.json();

                if (resultado.exito) {
                    pantallaLogin.classList.add('oculto');
                    pantallaPrincipal.classList.remove('oculto');
                    // 🔥 Cuando se loguea con éxito, mandamos a llamar los temas:
                    cargarTemas();
                } else {
                    lblError.textContent = resultado.mensaje;
                }
            } catch (error) {
                lblError.textContent = "❌ Error de conexión con el servidor.";
            }
        });

        // 📋 FUNCIÓN NUEVA: Traer los temas desde el Backend y pintarlos
        async function cargarTemas() {
            try {
                const respuesta = await fetch(`${BACKEND_URL}/api/temas`);
                const temas = await respuesta.json();
                
                contenedorTemas.innerHTML = ""; // Limpiar el texto de carga

                temas.forEach(tema => {
                    // Creamos el diseño de la tarjeta para cada tema
                    const card = document.createElement('div');
                    card.className = 'tema-card';
                    card.innerHTML = `
                        <div class="tema-info">
                            <h3>${tema.nombre}</h3>
                            <span>${tema.area}</span>
                        </div>
                        <div class="flecha">Entrar →</div>
                    `;
                    
                    // Evento momentáneo: por ahora solo avisará cuál elegiste
                    card.addEventListener('click', () => {
                        alert(`¡Primer paso completado! Elegiste: ${tema.nombre}. En el siguiente paso crearemos su pantalla de tutoría.`);
                    });

                    contenedorTemas.appendChild(card);
                });

            } catch (error) {
                contenedorTemas.innerHTML = "<p style='color:red;'>Error al cargar los temas.</p>";
            }
        }
    </script>
</body>
</html>
