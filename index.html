<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Entrenamiento Olímpico de Matemáticas</title>
        <style>

            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: #f4f6f9;
                color: #333;
                margin: 0;
                padding: 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .container {
                max-width: 800px;
                width: 100%;
                background: white;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
                box-sizing: border-box;
            }

            h1 {
                color: #1e3a8a;
                text-align: center;
                margin-top: 0;
            }

            button {
                background-color: #2563eb;
                color: white;
                border: none;
                padding: 12px 24px;
                font-size: 16px;
                border-radius: 8px;
                cursor: pointer;
                width: 100%;
                font-weight: bold;
                transition: background 0.2s;
            }

            button:hover {
                background-color: #1d4ed8;
            }

            .pizarra {
                margin-top: 25px;
                padding: 20px;
                background-color: #f8fafc;
                border-left: 5px solid #2563eb;
                border-radius: 4px;
                min-height: 150px;
                white-space: pre-line;
                font-size: 16px;
                line-height: 1.6;
            }
            
            .loading {
                color: #64748b;
                font-style: italic;
                text-align: center;
            }
            
        </style>

    </head>

    <body>

        <div class="container">
            
            <h1>Entrenador Olímpico de IA</h1>

            <p style="text-align: center; color: #64748b;">Presiona el botón para que la IA genere la clase de hoy</p>
            
            <button id="btnGenerar">Generar clase: principio de las casillas</button>
            
            <div id="pizarraClase" class="pizarra">
                <span class="loading">La pizarra está vacía. Presiona el botón de arriba...</span>
            </div>
        
        </div>

        <script>

            const btnGenerar = document.getElementById('btnGenerar');
            const pizarraClase = document.getElementById('pizarraClase');

            btnGenerar.addEventListener('click', async () => {
                pizarraClase.innerHTML = '<p class="loading">⏳La IA está redactando la teoría y resolviendo el problema de ejemplo... Por favor espera.</p>';

                try {
                    const respuesta = await fetch('https://olimpiadas-backend.onrender.com/api/generar-tema');
                    const datos = await respuesta.json();

                    if (datos.teoria) {
                        pizarraClase.textContent = datos.teoria;
                    } else {
                        pizarraClase.innerHTML = '<p style="color: red;">❌No se puedo obtener la teoría de la IA.</p>';
                    }
                }
                catch (error) {
                    console.error('Error al conectar con el backend:', error);
                    pizarraClase.innerHTML = '<p style="color: red;">❌Error: Asegúrate de que tu backend esté encendido en la terminal</p>';
                }
            });

        </script>

    </body>

</html>
