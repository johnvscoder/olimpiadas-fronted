<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenamiento Olímpico de Matemáticas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
            margin-top: 40px;
        }
        h1, h2 {
            color: #1e3a8a;
            text-align: center;
            margin-top: 0;
        }
        /* Estilos del Formulario de Login */
        .login-box {
            max-width: 400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input {
            padding: 12px;
            font-size: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .pizarra {
            margin-top: 25px;
            padding: 20px;
            background-color: #f8fafc;
            border-left: 5px solid #2563eb;
            border-radius: 4px;
            min-height: 150px;
            white-space: pre-line;
            font-size: 16px;
            line-height: 1.6;
        }
        .loading {
            color: #64748b;
            font-style: italic;
            text-align: center;
        }
        /* TRUCO: Clase para ocultar pantallas */
        .oculto {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="pantallaLogin" class="container">
        <h2>🔒 Ingreso de Alumnos</h2>
        <p style="text-align: center; color: #64748b;">Introduce las credenciales asignadas por tu entrenador.</p>
        
        <div class="login-box">
            <input type="text" id="txtUsuario" placeholder="Tu usuario">
            <input type="password" id="txtContrasena" placeholder="Tu contraseña">
            <button id="btnLogin">Iniciar Sesión</button>
            <p id="lblError" style="color: red; text-align: center; font-weight: bold; margin: 0;"></p>
        </div>
    </div>

    <div id="pantallaPrincipal" class="container oculto">
        <h1>🏆 Entrenador Olímpico de IA</h1>
        <p style="text-align: center; color: #64748b;">Presiona el botón para que la IA genere la clase de hoy.</p>
        
        <button id="btnGenerar">Generar Clase: Principio de las Casillas</button>

        <div id="pizarraClase" class="pizarra">
            <span class="loading">La pizarra está vacía. Presiona el botón de arriba...</span>
        </div>
    </div>

    <script>
        // Cambia esto por tu URL real de Render
        const BACKEND_URL = 'https://olimpiadas-backend.onrender.com';

        // Elementos de la interfaz
        const pantallaLogin = document.getElementById('pantallaLogin');
        const pantallaPrincipal = document.getElementById('pantallaPrincipal');
        const btnLogin = document.getElementById('btnLogin');
        const txtUsuario = document.getElementById('txtUsuario');
        const txtContrasena = document.getElementById('txtContrasena');
        const lblError = document.getElementById('lblError');
        
        const btnGenerar = document.getElementById('btnGenerar');
        const pizarraClase = document.getElementById('pizarraClase');

        // 🔐 Lógica del Botón de Login
        btnLogin.addEventListener('click', async () => {
            lblError.textContent = ""; // Limpiar errores previos
            
            try {
                const respuesta = await fetch(`${BACKEND_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        usuario: txtUsuario.value,
                        contrasena: txtContrasena.value
                    })
                });

                const resultado = await respuesta.json();

                if (resultado.exito) {
                    // ¡Logueado con éxito! Intercambiamos las pantallas
                    pantallaLogin.classList.add('oculto');
                    pantallaPrincipal.classList.remove('oculto');
                } else {
                    lblError.textContent = resultado.mensaje;
                }
            } catch (error) {
                console.error(error);
                lblError.textContent = "❌ Error de conexión con el servidor.";
            }
        });

        // 🤖 Tu Lógica de Gemini (Intacta, solo usando la variable BACKEND_URL)
        btnGenerar.addEventListener('click', async () => {
            pizarraClase.innerHTML = '<p class="loading">⏳ La IA está redactando la teoría y resolviendo el problema de ejemplo...</p>';
            
            try {
                const respuesta = await fetch(`${BACKEND_URL}/api/generar-tema`);
                const datos = await respuesta.json();

                if (datos.teoria) {
                    pizarraClase.textContent = datos.teoria;
                } else {
                    pizarraClase.innerHTML = '<p style="color: red;">❌ No se pudo obtener la teoría de la IA.</p>';
                }
            } catch (error) {
                console.error(error);
                pizarraClase.innerHTML = '<p style="color: red;">❌ Error al conectar con el backend.</p>';
            }
        });
    </script>

</body>
</html>
