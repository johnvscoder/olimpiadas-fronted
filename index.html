<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenamiento Olímpico de Matemáticas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
            margin-top: 20px;
        }

        h1,
        h2,
        h3 {
            color: #1e3a8a;
            text-align: center;
            margin-top: 0;
        }

        .login-box {
            max-width: 400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input,
        textarea {
            padding: 12px;
            font-size: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .btn-secundario {
            background-color: #64748b;
            margin-bottom: 15px;
            width: auto;
            padding: 8px 16px;
            font-size: 14px;
        }

        .btn-secundario:hover {
            background-color: #475569;
        }

        /* Lista de Temas */
        .lista-temas {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .tema-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tema-card:hover {
            border-color: #2563eb;
            background: #f0fdf4;
            transform: translateX(5px);
        }

        .tema-info h3 {
            margin: 0 0 5px 0;
            text-align: left;
        }

        .tema-info span {
            font-size: 13px;
            color: #64748b;
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 12px;
        }

        /* 🎯 ESTILOS NUEVOS: Pantalla del Tutor e Indicador de Nivel */
        .header-tutor {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .badge-nivel {
            background-color: #10b981;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .pizarra {
            padding: 20px;
            background-color: #f8fafc;
            border-left: 5px solid #2563eb;
            border-radius: 4px;
            min-height: 200px;
            white-space: pre-line;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .zona-respuesta {
            background-color: #f1f5f9;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .loading {
            color: #64748b;
            font-style: italic;
            text-align: center;
        }

        .oculto {
            display: none !important;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

    <div id="pantallaLogin" class="container">
        <h2>🔒 Ingreso de Alumnos</h2>
        <p style="text-align: center; color: #64748b;">Introduce las credenciales asignadas por tu entrenador.</p>
        <div class="login-box">
            <input type="text" id="txtUsuario" placeholder="Tu usuario">
            <input type="password" id="txtContrasena" placeholder="Tu contraseña">
            <button id="btnLogin">Iniciar Sesión</button>
            <p id="lblError" style="color: red; text-align: center; font-weight: bold; margin: 0;"></p>
        </div>
    </div>

    <div id="pantallaPrincipal" class="container oculto">
        <h1>🏆 Panel de Entrenamiento Olímpico</h1>
        <p style="text-align: center; color: #64748b;">Selecciona el tema de matemáticas que deseas entrenar hoy:</p>
        <div id="contenedorTemas" class="lista-temas">
            <p class="loading">Cargando temas disponibles...</p>
        </div>
    </div>

    <div id="pantallaTutor" class="container oculto">
        <button id="btnVolver" class="button btn-secundario">← Volver a Temas</button>

        <div class="header-tutor">
            <h2 id="lblNombreTema" style="margin: 0; text-align: left;">Tema de Olimpiada</h2>
            <div id="lblNivel" class="badge-nivel">Nivel 0 / 10</div>
        </div>

        <div id="pizarraTutor" class="pizarra">
            <p class="loading">Cargando lección del Tutor de IA...</p>
        </div>

        <div class="zona-respuesta">
            <label for="txtRespuesta" style="font-weight: bold; color: #1e3a8a;">✍️ Escribe tu solución detallada
                aquí:</label>
            <textarea id="txtRespuesta"
                placeholder="Explica tu razonamiento paso a paso y escribe tu respuesta final..."></textarea>
            <button id="btnEnviarRespuesta">Enviar Solución al Tutor</button>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://olimpiadas-backend.onrender.com';

        // Variables de Control de Estado del Alumno (Temporales en Frontend)
        let temaSeleccionadoId = '';
        let nivelActual = 0;

        // Elementos de la interfaz
        const pantallaLogin = document.getElementById('pantallaLogin');
        const pantallaPrincipal = document.getElementById('pantallaPrincipal');
        const pantallaTutor = document.getElementById('pantallaTutor');

        const btnLogin = document.getElementById('btnLogin');
        const txtUsuario = document.getElementById('txtUsuario');
        const txtContrasena = document.getElementById('txtContrasena');
        const lblError = document.getElementById('lblError');
        const contenedorTemas = document.getElementById('contenedorTemas');

        // Nuevos elementos del tutor
        const btnVolver = document.getElementById('btnVolver');
        const lblNombreTema = document.getElementById('lblNombreTema');
        const lblNivel = document.getElementById('lblNivel');
        const pizarraTutor = document.getElementById('pizarraTutor');
        const txtRespuesta = document.getElementById('txtRespuesta');
        const btnEnviarRespuesta = document.getElementById('btnEnviarRespuesta');

        // Lógica del Login
        btnLogin.addEventListener('click', async () => {
            lblError.textContent = "";
            try {
                const respuesta = await fetch(`${BACKEND_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: txtUsuario.value, contrasena: txtContrasena.value })
                });
                const resultado = await respuesta.json();

                if (resultado.exito) {
                    pantallaLogin.classList.add('oculto');
                    pantallaPrincipal.classList.remove('oculto');
                    cargarTemas();
                } else {
                    lblError.textContent = resultado.mensaje;
                }
            } catch (error) {
                lblError.textContent = "❌ Error de conexión con el servidor.";
            }
        });

        // Cargar temas del backend
        async function cargarTemas() {
            try {
                const respuesta = await fetch(`${BACKEND_URL}/api/temas`);
                const temas = await respuesta.json();
                contenedorTemas.innerHTML = "";

                temas.forEach(tema => {
                    const card = document.createElement('div');
                    card.className = 'tema-card';
                    card.innerHTML = `
                        <div class="tema-info">
                            <h3>${tema.nombre}</h3>
                            <span>${tema.area}</span>
                        </div>
                        <div class="flecha">Entrar →</div>
                    `;

                    // ACCIÓN DEL CLIC: Ir a la pantalla del tutor
                    card.addEventListener('click', () => {
                        activarPantallaTutor(tema.id, tema.nombre);
                    });

                    contenedorTemas.appendChild(card);
                });
            } catch (error) {
                contenedorTemas.innerHTML = "<p style='color:red;'>Error al cargar los temas.</p>";
            }
        }

        // 🔄 FUNCIÓN NUEVA: Intercambio de pantalla hacia el Tutor
        function activarPantallaTutor(idTema, nombreTema) {
            temaSeleccionadoId = idTema;
            nivelActual = 0; // Por ahora empezamos en cero cada vez

            // Actualizar textos informativos
            lblNombreTema.textContent = nombreTema;
            lblNivel.textContent = `Nivel ${nivelActual} / 10`;
            pizarraTutor.innerHTML = `<p class="loading">⏳ El tutor de IA está preparando el material de nivel ${nivelActual} sobre "${nombreTema}"...</p>`;
            txtRespuesta.value = ""; // Limpiar cuadro de texto

            // Cambiar visibilidad de pantallas
            pantallaPrincipal.classList.add('oculto');
            pantallaTutor.classList.remove('oculto');

            // Llamada provisional: Usamos tu ruta vieja de Gemini por ahora
            consultarTutorIA();
        }

        // Botón Volver
        btnVolver.addEventListener('click', () => {
            pantallaTutor.classList.add('oculto');
            pantallaPrincipal.classList.remove('oculto');
        });

        // 🤖 ACTUALIZADO CON VELOCIDAD SUAVE (MÁQUINA DE ESCRIBIR) Y MARKDOWN
        async function consultarTutorIA() {
            try {
                const respuesta = await fetch(`${BACKEND_URL}/api/tutor/clase`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        temaId: temaSeleccionadoId,
                        nivel: nivelActual
                    })
                });

                if (!respuesta.ok) throw new Error("Error en la respuesta del servidor");

                const reader = respuesta.body.getReader();
                const decoder = new TextDecoder();

                pizarraTutor.innerHTML = "";

                let textoRecibidoCompleto = ""; // Guarda todo lo que llega de la IA
                let textoRenderizadoActual = ""; // Lo que se ha mostrado en pantalla hasta el momento
                let indiceEfecto = 0; // Marcador de posición para el retraso

                // ⏱️ CONFIGURACIÓN DE VELOCIDAD
                // Menos milisegundos = Más rápido. 15ms a 25ms suele dar el efecto más estético.
                const VELOCIDAD_MS = 20;

                // Este intervalo se encarga de ir imprimiendo el texto letra por letra de forma constante
                const intervaloEscritura = setInterval(() => {
                    // Si ya imprimimos todo lo que ha llegado hasta el momento
                    if (indiceEfecto >= textoRecibidoCompleto.length) {
                        // Si el lector de internet ya terminó por completo, limpiamos el timer
                        if (window.streamTerminado) {
                            clearInterval(intervaloEscritura);
                        }
                        return; // Esperamos en el siguiente ciclo a que llegue más internet
                    }

                    // Agregamos el siguiente carácter disponible en la cola
                    textoRenderizadoActual += textoRecibidoCompleto[indiceEfecto];
                    indiceEfecto++;

                    // Renderizamos en la pizarra convirtiendo a Markdown en tiempo real
                    pizarraTutor.innerHTML = marked.parse(textoRenderizadoActual);
                }, VELOCIDAD_MS);

                // Control de estado para avisar al intervalo que el flujo de red terminó
                window.streamTerminado = false;

                // Bucle que lee la red a máxima velocidad y la acumula en el buffer de espera
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    const chunkTexto = decoder.decode(value, { stream: true });
                    const lineas = chunkTexto.split('\n');

                    for (const linea of lineas) {
                        const lineaLimpia = linea.trim();
                        if (!lineaLimpia || lineaLimpia === 'data: [DONE]') continue;

                        if (lineaLimpia.startsWith('data: ')) {
                            try {
                                const jsonString = lineaLimpia.slice(6);
                                const objetoData = JSON.parse(jsonString);

                                if (objetoData.texto) {
                                    // En lugar de renderizar aquí de golpe, lo acumulamos en la cola de impresión
                                    textoRecibidoCompleto += objetoData.texto;
                                }
                            } catch (err) {
                                console.warn("Paquete fragmentado recibido de forma asíncrona");
                            }
                        }
                    }
                }

                // Cuando el bucle del fetch termina por completo, le avisamos al intervalo
                window.streamTerminado = true;

            } catch (error) {
                console.error(error);
                pizarraTutor.innerHTML = "<p style='color:red;'>❌ Error al conectar con el Tutor de IA. Intenta de nuevo en unos segundos.</p>";
            }
        }


        // 🚀 EVALUACIÓN CORREGIDA: Enviar la solución Y el problema planteado al servidor
        btnEnviarRespuesta.addEventListener('click', async () => {
            const respuestaAlumno = txtRespuesta.value.trim();
            // 🔥 CAPTURAMOS EL PROBLEMA: Extraemos el texto actual de la pizarra para que la IA sepa qué evaluar
            const problemaPlanteado = pizarraTutor.textContent;

            if (!respuestaAlumno) {
                alert("⚠️ Por favor, escribe tu solución antes de enviarla.");
                return;
            }

            // Bloquear interfaz visual mientras la IA piensa
            btnEnviarRespuesta.disabled = true;
            btnEnviarRespuesta.textContent = "⏳ El Tutor está evaluando tu lógica...";
            pizarraTutor.innerHTML = `<p class="loading">🧠 El Tutor de IA está analizando tu procedimiento matemático paso a paso...</p>`;

            try {
                const respuesta = await fetch(`${BACKEND_URL}/api/tutor/evaluar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        temaId: temaSeleccionadoId,
                        nivel: nivelActual,
                        problemaContexto: problemaPlanteado, // 🔥 Enviamos el problema aquí
                        respuestaAlumno: respuestaAlumno
                    })
                });

                const resultado = await respuesta.json();

                // Mostrar la corrección del tutor
                alert(`📢 EVALUACIÓN DEL TUTOR:\n\n${resultado.retroalimentacion}\n\nResultado: ¡Se decidió ${resultado.decision}!`);

                // Actualizar el estado del nivel
                nivelActual = resultado.nuevoNivel;
                lblNivel.textContent = `Nivel ${nivelActual} / 10`;

                // Limpiar el campo de texto y cargar la nueva lección
                txtRespuesta.value = "";
                pizarraTutor.innerHTML = `<p class="loading">🔄 Cargando material adaptado para el Nivel ${nivelActual}...</p>`;
                consultarTutorIA();

            } catch (error) {
                console.error(error);
                alert("❌ Ocurrió un error al enviar la solución.");
            } finally {
                btnEnviarRespuesta.disabled = false;
                btnEnviarRespuesta.textContent = "Enviar Solución al Tutor";
            }
        });


    </script>
</body>

</html>
